<!doctype html>

<html lang="%paraglide.lang%" dir="%paraglide.dir%">
	<head>
		<meta charset="utf-8" />

		<meta
			name="viewport"
			content="width=device-width, initial-scale=1"
		/>

		<meta name="text-scale" content="scale" />
		<script>
			if (location.protocol === 'views:' && location.pathname.endsWith('/index.html')) {
				const normalized = new URL(location.href);
				normalized.pathname = normalized.pathname.slice(0, -'index.html'.length);
				history.replaceState(history.state, '', normalized);
			}
		</script>
		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover"><div style="display: contents">%sveltekit.body%</div></body>
</html>
